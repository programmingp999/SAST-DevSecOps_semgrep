name: Build, Scan and Push Docker Image

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io

jobs:
  security-analysis:
    name: Security Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./Dockerfile
          failure-threshold: warning

  build-and-scan:
    name: Build and Security Scan
    runs-on: ubuntu-latest
    needs: security-analysis
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize image name to lowercase
        run: echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build LOCAL image for scanning (no push)
      - name: Build Docker image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy scan -> SARIF (on LOCAL image).
      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:scan
          scanners: vuln,misconfig,secret
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          version: v0.69.3
          severity: CRITICAL,HIGH,MEDIUM

      - name: Run Trivy full JSON report
        uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:scan
          scanners: vuln,misconfig,secret
          format: json
          output: trivy-results.json
          exit-code: '0'
          skip-setup-trivy: true
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif

      - name: Upload SARIF artifact
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

      - name: Upload JSON artifact
        if: always() && hashFiles('trivy-results.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-json
          path: trivy-results.json

      - name: Fail when SARIF is missing
        if: always() && hashFiles('trivy-results.sarif') == ''
        run: |
          echo "::error::trivy-results.sarif was not generated."
          exit 1

      # Security Gate
      - name: Run Trivy security gate (fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:scan
          scanners: vuln,misconfig,secret
          exit-code: '1'
          ignore-unfixed: true
          skip-setup-trivy: true
          severity: CRITICAL,HIGH

  push-image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize image name to lowercase
        run: echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # SBOM AFTER push (image exists in GHCR)
      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ steps.meta.outputs.version }}
          version: v0.69.3
          format: spdx-json
          output: sbom.spdx.json
          skip-setup-trivy: true

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
